server:
  port: 8282

spring:
  application:
    name: cloud-gateway
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    gateway:
      # automated routing start #
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # automated routing end #
      # manual routing start #
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**, /customer/**
          filters:
            - name: AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: user-service
                fallbackUri: forward:/fallback/userServiceFallback

        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/account/**
          filters:
            - name: AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: account-service
                fallbackUri: forward:/fallback/accountServiceFallback

        - id: fund-transfer-service
          uri: lb://fund-transfer-service
          predicates:
            - Path=/fund-transfer-service/**
          filters:
            - name: AuthenticationFilter

        - id: loan-service
          uri: lb://loan-service
          predicates:
            - Path=/loan/**
          filters:
            - name: AuthenticationFilter

        - id: payment-service
          uri: lb://loan-service
          predicates:
            - Path=/loan/**
          filters:
            - name: AuthenticationFilter
      # manual routing end #

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    show-details: always

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000 # 10 seconds
        permitted-number-of-calls-in-half-open-state: 3
      account-service:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000 # 10 seconds
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.net.ConnectException
        ignore-exceptions:
            - java.lang.IllegalArgumentException

logging:
  level:
    root: info
    com.merin.cloudGateway: TRACE

